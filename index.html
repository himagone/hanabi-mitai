<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>ハナビミタイ</title>
  <link rel="stylesheet" href="/src/style.css" />
</head>
<body>
  <div id="app">
    <header id="header">
      <h1>ハナビミタイ</h1>
      <p class="subtitle">花火の見える場所を探す</p>
    </header>

    <div id="controls">
      <div class="input-group">
        <label for="preset">花火大会</label>
        <select id="preset">
          <option value="">-- 花火大会を選ぶ --</option>
          <option value="35.715685,139.805040" data-diameter="100">隅田川花火大会（第一会場）</option>
          <option value="35.704909,139.795398" data-diameter="80">隅田川花火大会（第二会場）</option>
          <option value="35.759281,139.795234" data-diameter="90">足立の花火</option>
          <option value="35.718682,139.902050" data-diameter="90">江戸川区花火大会</option>
          <option value="35.761218,139.881311" data-diameter="90">葛飾納涼花火大会</option>
          <option value="35.793500,139.678000" data-diameter="120">いたばし花火大会（推定場所）</option>
          <option value="35.629000,139.774500" data-diameter="70">STAR ISLAND（推定場所）</option>
          <option value="35.629000,139.774500" data-diameter="70">お台場レインボー花火（推定場所）</option>
          <option value="35.674500,139.717000" data-diameter="80">神宮外苑花火大会（推定場所）</option>
          <option value="35.662000,139.483500" data-diameter="110">東京競馬場花火（推定場所）</option>
          <option value="35.651500,139.548000" data-diameter="100">調布花火（推定場所）</option>
          <option value="35.611500,139.627000" data-diameter="80">世田谷区たまがわ花火大会（推定場所）</option>

        </select>
        <span id="preset-hint" class="preset-hint hidden"></span>
      </div>
      <div class="input-group desktop-only">
        <label for="lat">緯度</label>
        <input type="number" id="lat" step="0.0001" placeholder="35.7148" />
      </div>
      <div class="input-group desktop-only">
        <label for="lng">経度</label>
        <input type="number" id="lng" step="0.0001" placeholder="139.8033" />
      </div>
      <div class="input-group desktop-only">
        <label for="radius">探す範囲</label>
        <select id="radius">
          <option value="1000">1,000m</option>
          <option value="1500">1,500m</option>
          <option value="2000" selected>2,000m</option>
          <option value="3000">3,000m</option>
        </select>
      </div>
      <button id="analyze-btn" type="button" class="desktop-only">ベストスポットを探す</button>
      <div class="exclusion-controls desktop-only">
        <button id="draw-rect-btn" type="button" class="btn-tool" title="ドラッグで立入禁止エリアを描画">
          <svg width="16" height="16" viewBox="0 0 16 16"><rect x="2" y="3" width="12" height="10" rx="1" fill="none" stroke="currentColor" stroke-width="1.5"/></svg>
          立入禁止エリア
        </button>
        <button id="undo-exclusion-btn" type="button" class="btn-tool btn-small hidden">戻す</button>
        <button id="clear-exclusion-btn" type="button" class="btn-tool btn-small hidden">全削除</button>
      </div>
      <p class="hint desktop-only">または地図をクリックして打上地点を指定</p>
    </div>

    <div id="mobile-score-card" class="hidden">
      <div class="score-card-header">
        <div class="score-card-main">
          <div class="score-big"><span id="score-value">--</span><span class="score-unit">点</span></div>
          <span class="score-badge" id="score-badge"></span>
        </div>
        <button id="score-card-close" type="button" aria-label="閉じる">&times;</button>
      </div>
      <div class="score-reason" id="sc-reason"></div>
      <div class="score-card-details">
        <div class="score-detail-item">
          <div class="detail-label-row">
            <span class="detail-label">距離</span>
            <span class="detail-value" id="sc-distance">--</span>
          </div>
        </div>
        <div class="score-detail-item">
          <div class="detail-label-row">
            <span class="detail-label">見上げる角度</span>
            <span class="detail-value" id="sc-angle">--</span>
          </div>
          <div class="bar-track"><div class="bar-fill" id="bar-angle" style="width:0"></div></div>
        </div>
        <div class="score-detail-item">
          <div class="detail-label-row">
            <span class="detail-label">見通し</span>
            <span class="detail-value" id="sc-los">--</span>
          </div>
          <div class="bar-track"><div class="bar-fill bar-green" id="bar-los" style="width:0"></div></div>
        </div>
        <div class="score-detail-item">
          <div class="detail-label-row">
            <span class="detail-label">周辺環境</span>
            <span class="detail-value" id="sc-access-label">--</span>
          </div>
          <div class="bar-track"><div class="bar-fill bar-purple" id="bar-access" style="width:0"></div></div>
        </div>
        <div class="score-detail-item">
          <div class="detail-label-row">
            <span class="detail-label">地形</span>
            <span class="detail-value" id="sc-elevation">--</span>
          </div>
          <div class="bar-track"><div class="bar-fill bar-yellow" id="bar-slope" style="width:0"></div></div>
        </div>
        <button id="score-retry-btn" type="button" class="score-retry">別の場所で調べる</button>
      </div>
    </div>

    <div id="map-container">
      <div id="map"></div>
      <button id="score-here-btn" type="button" class="mobile-only">ここから見える？</button>
      <div id="editor-hint" class="hidden">
        <span id="editor-hint-text"></span>
      </div>
      <div id="loading" class="hidden">
        <div class="spinner"></div>
        <p id="loading-text">分析中…</p>
        <div class="loading-steps desktop-only" id="loading-steps">
          <div class="loading-step" data-step="grid"><span class="step-icon">○</span>周辺調査</div>
          <div class="loading-step" data-step="elevation"><span class="step-icon">○</span>地形解析</div>
          <div class="loading-step" data-step="scoring"><span class="step-icon">○</span>スコアリング</div>
        </div>
      </div>
    </div>

    <div id="results" class="hidden">
      <h2>おすすめスポット</h2>
      <div id="results-list"></div>
    </div>
  </div>

  <script type="module" src="/src/main.ts"></script>
</body>
</html>
