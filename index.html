<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>花火みたい - ベストポジション検索</title>
  <link rel="stylesheet" href="/src/style.css" />
</head>
<body>
  <div id="app">
    <header id="header">
      <h1>花火みたい</h1>
      <p class="subtitle">花火のベストポジションを地形から分析</p>
    </header>

    <div id="controls">
      <div class="input-group">
        <label for="preset">花火大会</label>
        <select id="preset">
          <option value="">-- 選択してください --</option>
          <option value="35.758284,139.795596" data-diameter="120">足立の花火（4号玉）</option>
          <option value="35.716831,139.805267" data-diameter="150">隅田川花火大会（5号玉）</option>
        </select>
      </div>
      <div class="input-group desktop-only">
        <label for="lat">緯度</label>
        <input type="number" id="lat" step="0.0001" placeholder="35.7148" />
      </div>
      <div class="input-group desktop-only">
        <label for="lng">経度</label>
        <input type="number" id="lng" step="0.0001" placeholder="139.8033" />
      </div>
      <div class="input-group desktop-only">
        <label for="radius">検索半径 (m)</label>
        <select id="radius">
          <option value="1000">1,000m</option>
          <option value="1500">1,500m</option>
          <option value="2000" selected>2,000m</option>
          <option value="3000">3,000m</option>
        </select>
      </div>
      <button id="analyze-btn" type="button" class="desktop-only">分析する</button>
      <div class="exclusion-controls desktop-only">
        <button id="draw-rect-btn" type="button" class="btn-tool" title="ドラッグで立入禁止エリアを描画">
          <svg width="16" height="16" viewBox="0 0 16 16"><rect x="2" y="3" width="12" height="10" rx="1" fill="none" stroke="currentColor" stroke-width="1.5"/></svg>
          立入禁止エリア
        </button>
        <button id="undo-exclusion-btn" type="button" class="btn-tool btn-small hidden">戻す</button>
        <button id="clear-exclusion-btn" type="button" class="btn-tool btn-small hidden">全削除</button>
      </div>
      <button id="score-here-btn" type="button" class="mobile-only">現在地のスコアを確認</button>
      <p class="hint desktop-only">または地図をクリックして打上地点を指定</p>
    </div>

    <div id="mobile-score-card" class="hidden">
      <div class="score-card-main">
        <div class="score-big"><span id="score-value">--</span><span class="score-unit">点</span></div>
        <div class="score-label">ここからの見やすさ</div>
      </div>
      <div class="score-card-details">
        <div class="score-detail-row">
          <span>距離</span><span id="sc-distance">--</span>
        </div>
        <div class="score-detail-row">
          <span>仰角</span><span id="sc-angle">--</span>
        </div>
        <div class="score-detail-row">
          <span>標高差</span><span id="sc-elevation">--</span>
        </div>
        <div class="score-detail-row">
          <span>視界</span><span id="sc-los">--</span>
        </div>
        <div class="score-card-bar">
          <div class="bar-item">
            <div class="bar-track"><div class="bar-fill" id="bar-angle" style="width:0"></div></div>
            <span>仰角</span>
          </div>
          <div class="bar-item">
            <div class="bar-track"><div class="bar-fill bar-green" id="bar-los" style="width:0"></div></div>
            <span>視界</span>
          </div>
          <div class="bar-item">
            <div class="bar-track"><div class="bar-fill bar-purple" id="bar-access" style="width:0"></div></div>
            <span>場所</span>
          </div>
          <div class="bar-item">
            <div class="bar-track"><div class="bar-fill bar-yellow" id="bar-slope" style="width:0"></div></div>
            <span>勾配</span>
          </div>
        </div>
        <div class="score-reason" id="sc-reason"></div>
      </div>
    </div>

    <div id="map-container">
      <div id="map"></div>
      <div id="editor-hint" class="hidden">
        <span id="editor-hint-text"></span>
      </div>
      <div id="loading" class="hidden">
        <div class="spinner"></div>
        <p>地形データを分析中...</p>
      </div>
    </div>

    <div id="results" class="hidden">
      <h2>おすすめポジション</h2>
      <div id="results-list"></div>
    </div>
  </div>

  <script type="module" src="/src/main.ts"></script>
</body>
</html>
