<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>花火みたい - ベストポジション検索</title>
  <link rel="stylesheet" href="/src/style.css" />
</head>
<body>
  <div id="app">
    <header id="header">
      <h1>花火みたい</h1>
      <p class="subtitle">花火のベストポジションを地形から分析</p>
    </header>

    <div id="controls">
      <div class="input-group">
        <label for="lat">緯度</label>
        <input type="number" id="lat" step="0.0001" placeholder="35.7148" />
      </div>
      <div class="input-group">
        <label for="lng">経度</label>
        <input type="number" id="lng" step="0.0001" placeholder="139.8033" />
      </div>
      <div class="input-group">
        <label for="radius">検索半径 (m)</label>
        <select id="radius">
          <option value="1000">1,000m</option>
          <option value="1500">1,500m</option>
          <option value="2000" selected>2,000m</option>
          <option value="3000">3,000m</option>
        </select>
      </div>
      <button id="analyze-btn" type="button">分析する</button>
      <p class="hint">または地図をクリックして打上地点を指定</p>
    </div>

    <div id="map-container">
      <div id="map"></div>
      <div id="loading" class="hidden">
        <div class="spinner"></div>
        <p>地形データを分析中...</p>
      </div>
    </div>

    <div id="results" class="hidden">
      <h2>おすすめポジション</h2>
      <div id="results-list"></div>
    </div>
  </div>

  <script type="module" src="/src/main.ts"></script>
</body>
</html>
